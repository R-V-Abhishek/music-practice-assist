<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Raga Practice</title>
  <style>
    :root {
      --bg-0: #020617;
      --bg-1: #0f172a;
      --bg-2: #111827;
      --bg-3: #1e293b;
      --line: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --brand: #22d3ee;
      --good: #86efac;
      --warn: #fbbf24;
      --bad: #fecaca;
      --orange: #fb923c;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(34, 211, 238, 0.12), transparent 35%),
        radial-gradient(circle at 90% 20%, rgba(59, 130, 246, 0.08), transparent 30%),
        var(--bg-1);
      min-height: 100vh;
      padding: 1.5rem;
    }

    .app { max-width: 980px; margin: 0 auto; }

    .topbar {
      display: block;
      margin-bottom: 1rem;
    }

    .title { margin: 0; font-size: 1.6rem; letter-spacing: 0.2px; }
    .subtitle { margin-top: 0.35rem; color: var(--muted); font-size: 0.92rem; }

    .card {
      background: linear-gradient(180deg, rgba(17, 24, 39, 0.9), rgba(15, 23, 42, 0.92));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 1rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
    }

    .controls {
      display: grid;
      grid-template-columns: 1.2fr auto auto auto;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 0.75rem;
      margin-top: 0.8rem;
    }

    .kpi {
      background: rgba(2, 6, 23, 0.55);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0.55rem 0.65rem;
    }
    .kpi .label { color: var(--muted); font-size: 0.78rem; margin-bottom: 0.25rem; }
    .kpi .value { font-size: 1rem; color: var(--text); font-weight: 600; }

    .stack { display: grid; gap: 1rem; margin-top: 1rem; }

    select, button {
      width: 100%;
      padding: 0.6rem 0.72rem;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--bg-3);
      color: var(--text);
      font-size: 0.95rem;
    }
    button { cursor: pointer; transition: all 0.15s ease; }
    button:hover:enabled { transform: translateY(-1px); border-color: #475569; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #startBtn { border-color: rgba(34, 211, 238, 0.4); }

    .section-title {
      margin: 0 0 0.7rem 0;
      color: var(--muted);
      font-size: 0.92rem;
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }

    /* Group 2: Rich alert panel */
    .alert-panel {
      min-height: 56px;
      padding: 0.6rem 0.7rem;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(2, 6, 23, 0.55);
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
      position: relative;
      overflow: hidden;
    }
    .alert-panel.severity-forbidden_note { color: var(--bad); border-color: rgba(254, 202, 202, 0.35); }
    .alert-panel.severity-forbidden_phrase { color: var(--orange); border-color: rgba(251, 146, 60, 0.35); }
    .alert-panel.severity-gamaka_missing { color: var(--warn); border-color: rgba(251, 191, 36, 0.35); }
    .alert-panel.severity-cleared { color: var(--good); border-color: rgba(134, 239, 172, 0.35); }
    .alert-panel .alert-title { font-weight: 700; margin-bottom: 0.25rem; }
    .alert-panel .alert-message { margin-bottom: 0.2rem; }
    .alert-panel .alert-suggestion { padding-left: 0.8rem; font-size: 0.88rem; color: var(--muted); margin-bottom: 0.2rem; }
    .alert-panel details { font-size: 0.84rem; color: var(--muted); }
    .alert-panel details summary { cursor: pointer; user-select: none; }
    .alert-panel .alert-correction { font-size: 0.84rem; color: var(--muted); margin-top: 0.15rem; }
    /* Auto-dismiss progress bar */
    .alert-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 3px;
      background: currentColor;
      opacity: 0.5;
      width: 100%;
      transform-origin: left;
      animation: drain 5s linear forwards;
    }
    @keyframes drain { from { transform: scaleX(1); } to { transform: scaleX(0); } }

    /* Group 3: Prayoga toast */
    .toast-container {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }
    .toast {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(134, 239, 172, 0.45);
      color: var(--good);
      padding: 0.6rem 1rem;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      backdrop-filter: blur(8px);
      opacity: 1;
      transition: opacity 0.4s ease;
    }
    .toast.fading { opacity: 0; }

    /* Group 4: Event log */
    .log-toggle-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.85rem;
      cursor: pointer;
      padding: 0;
      width: auto;
      text-decoration: underline;
    }
    .log-toggle-btn:hover { color: var(--text); }
    .event-log {
      max-height: 200px;
      overflow-y: auto;
      margin-top: 0.5rem;
      padding: 0;
      list-style: none;
    }
    .event-log li {
      font-size: 0.82rem;
      color: var(--muted);
      padding: 0.15rem 0;
      border-bottom: 1px solid rgba(51, 65, 85, 0.3);
    }
    .event-log li.log-prayoga { color: var(--good); }
    .event-log li.log-error { color: var(--bad); }
    .event-log li.log-warn { color: var(--orange); }
    .event-log li.log-cleared { color: #6ee7b7; }

    /* Group 6: Session summary overlay */
    .summary-overlay {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(2, 6, 23, 0.7);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .summary-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .summary-panel {
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: 14px 14px 0 0;
      padding: 1.5rem;
      width: 100%;
      max-width: 700px;
      max-height: 80vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.35s ease;
    }
    .summary-overlay.visible .summary-panel {
      transform: translateY(0);
    }
    .summary-panel h3 { margin: 0 0 0.8rem 0; font-size: 1.2rem; }
    .summary-panel .summary-row { display: flex; justify-content: space-between; padding: 0.35rem 0; border-bottom: 1px solid rgba(51, 65, 85, 0.3); font-size: 0.92rem; }
    .summary-panel .summary-row .sr-label { color: var(--muted); }
    .summary-panel .summary-row .sr-value { font-weight: 600; }
    .summary-panel .summary-section { margin-top: 0.8rem; }
    .summary-panel .summary-section h4 { margin: 0 0 0.3rem 0; font-size: 0.95rem; color: var(--muted); text-transform: uppercase; }
    .summary-panel ul { margin: 0.3rem 0; padding-left: 1.2rem; }
    .summary-panel li { font-size: 0.88rem; margin-bottom: 0.2rem; }
    .summary-actions { display: flex; gap: 0.75rem; margin-top: 1rem; }
    .summary-actions button { flex: 1; }

    /* Group 8: Gamaka badge */
    .gamaka-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--warn);
      margin-left: 6px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .gamaka-badge.visible { opacity: 1; }

    canvas {
      width: 100%;
      background: var(--bg-0);
      border: 1px solid var(--line);
      border-radius: 10px;
      margin-top: 0.4rem;
    }

    @media (max-width: 980px) {
      .controls { grid-template-columns: 1fr; }
      .kpi-grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <h2 class="title">Live Raga Practice Dashboard</h2>
        <div class="subtitle">Clean live swara tracking</div>
      </div>
    </div>

    <div class="card">
      <div class="controls">
        <select id="ragaSelect" aria-label="Select Raga"></select>
        <!-- Group 5: Language selector -->
        <select id="langSelect" aria-label="Select Language">
          <option value="english" selected>English</option>
          <option value="kannada">ಕನ್ನಡ</option>
          <option value="tamil">தமிழ்</option>
          <option value="telugu">తెలుగు</option>
        </select>
        <button id="startBtn">Start Session</button>
        <button id="stopBtn" disabled>Stop Session</button>
      </div>

      <!-- KPI grid: original 4 + Group 1 Direction & Accuracy + Group 8 Gamaka -->
      <div class="kpi-grid">
        <div class="kpi"><div class="label">Status</div><div class="value" id="status">idle</div></div>
        <div class="kpi"><div class="label">Tonic Sa</div><div class="value" id="tonic">-</div></div>
        <div class="kpi"><div class="label">Current Swara</div><div class="value"><span id="swara">-</span> <span id="deviation" style="color: var(--muted); font-size: 0.85em; font-weight: normal; margin-left: 6px;"></span><span id="gamakaBadge" class="gamaka-badge"></span></div></div>
        <div class="kpi"><div class="label">Pitch</div><div class="value" id="pitch">-</div></div>
        <div class="kpi"><div class="label">Direction</div><div class="value" id="direction">-</div></div>
        <div class="kpi"><div class="label">Accuracy</div><div class="value" id="accuracy">-</div></div>
        <div class="kpi"><div class="label">Gamaka</div><div class="value" id="gamaka">-</div></div>
      </div>
    </div>

    <div class="stack">
      <div class="card">
        <h3 class="section-title">Live Swara Graph</h3>
        <canvas id="swaraCanvas" width="1100" height="280"></canvas>
      </div>

      <!-- Group 2: Rich alert panel -->
      <div class="card">
        <h3 class="section-title">Alerts</h3>
        <div id="alertPanel" class="alert-panel">No alerts</div>
      </div>

      <!-- Group 4: Event log (collapsed by default) -->
      <div class="card">
        <button class="log-toggle-btn" id="logToggleBtn">Show Event Log</button>
        <ul id="eventLog" class="event-log" style="display:none;"></ul>
      </div>
    </div>
  </div>

  <!-- Group 3: Prayoga toast container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Group 6: Session summary overlay -->
  <div id="summaryOverlay" class="summary-overlay">
    <div class="summary-panel" id="summaryPanel"></div>
  </div>

  <script>
    /* ── DOM refs ── */
    const ragaSelect = document.getElementById("ragaSelect");
    const langSelect = document.getElementById("langSelect");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const statusEl = document.getElementById("status");
    const tonicEl = document.getElementById("tonic");
    const swaraEl = document.getElementById("swara");
    const deviationEl = document.getElementById("deviation");
    const pitchEl = document.getElementById("pitch");
    const directionEl = document.getElementById("direction");
    const accuracyEl = document.getElementById("accuracy");
    const gamakaEl = document.getElementById("gamaka");
    const gamakaBadge = document.getElementById("gamakaBadge");
    const alertPanel = document.getElementById("alertPanel");
    const toastContainer = document.getElementById("toastContainer");
    const logToggleBtn = document.getElementById("logToggleBtn");
    const eventLogEl = document.getElementById("eventLog");
    const summaryOverlay = document.getElementById("summaryOverlay");
    const summaryPanel = document.getElementById("summaryPanel");
    const swaraCanvas = document.getElementById("swaraCanvas");
    const swaraCtx = swaraCanvas.getContext("2d");

    const STORAGE_KEY = "raga-practice-ui-state-v1";

    let ws = null;
    let audioContext = null;
    let mediaStream = null;
    let sourceNode = null;
    let workletNode = null;
    let sessionId = null;
    let _teardownInProgress = false;
    let chunkId = 0;
    const graphPoints = [];
    const maxGraphPoints = 180;
    const graphUpdateIntervalMs = 45;
    let lastGraphTs = -1;
    let latestSwaraIndex = null;
    let latestCentsDev = 0;
    let latestErrorType = null;
    let lastGraphPushMs = 0;

    /* Group 1: live accuracy counters */
    let totalVoicedFrames = 0;
    let correctFrames = 0;

    /* Group 8: gamaka clear timer */
    let gamakaClearTimer = null;
    let gamakaBadgeClearTimer = null;

    const appState = {
      uiState: "idle",
      wsState: "disconnected",
      selectedRaga: "",
      statusText: "idle",
      tonicText: "-",
      swaraText: "-",
      deviationText: "",
      pitchText: "-",
      directionText: "-",
      directionColor: "var(--muted)",
      events: [],
      ragas: [],
    };

    const swaraLabels = ["Sa", "Ri1", "Ri2", "Ga1", "Ga2", "Ma1", "Ma2", "Pa", "Dha1", "Dha2", "Ni1", "Ni2"];
    const swaraToIndex = new Map([
      ["Sa", 0],
      ["Ri1", 1], ["R1", 1], ["Re1", 1],
      ["Ri2", 2], ["R2", 2], ["Re2", 2],
      ["Ga1", 3], ["G1", 3],
      ["Ga2", 4], ["G2", 4], ["Ga3", 4], ["G3", 4],
      ["Ma1", 5], ["M1", 5],
      ["Ma2", 6], ["M2", 6],
      ["Pa", 7], ["P", 7],
      ["Dha1", 8], ["D1", 8], ["Da1", 8],
      ["Dha2", 9], ["D2", 9], ["Da2", 9], ["Dha3", 9], ["D3", 9],
      ["Ni1", 10], ["N1", 10],
      ["Ni2", 11], ["N2", 11], ["Ni3", 11], ["N3", 11],
    ]);

    /* ── Graph helpers ── */
    function yForSwaraIndex(index, canvasHeight, centsDev) {
      const topPad = 12;
      const bottomPad = 14;
      const plotHeight = canvasHeight - topPad - bottomPad;
      const step = plotHeight / (swaraLabels.length - 1);
      const t = Math.max(0, Math.min(1, index / (swaraLabels.length - 1)));
      const baseY = (canvasHeight - bottomPad) - (t * plotHeight);
      // Group 7: micro-position by cents_deviation (±50 cents = ±half step)
      if (typeof centsDev === 'number' && isFinite(centsDev)) {
        const centsOffset = Math.max(-50, Math.min(50, centsDev));
        return baseY - (centsOffset / 100) * step;
      }
      return baseY;
    }

    function yForSwaraIndexBase(index, canvasHeight) {
      return yForSwaraIndex(index, canvasHeight, 0);
    }

    /* Group 7: colour for error type */
    function colorForErrorType(errType) {
      if (errType === 'forbidden_note') return '#fecaca';
      if (errType === 'forbidden_phrase') return '#fb923c';
      if (errType === 'gamaka_missing') return '#fbbf24';
      return '#22d3ee';
    }

    function persistUiState() {
      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify({ selectedRaga: appState.selectedRaga })
      );
    }

    function restoreUiState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed.selectedRaga === "string") {
          appState.selectedRaga = parsed.selectedRaga;
        }
      } catch (_) {
        // Ignore malformed localStorage payload
      }
    }

    const _PRAYOGA_CONGRATS = [
      '🎉 Excellent!', '✨ Beautiful!', '🌟 Superb!', '👏 Well done!', '🎵 Perfect phrasing!'
    ];

    function pushEvent(message, cls = '') {
      const stamp = new Date().toLocaleTimeString();
      appState.events.unshift({ text: `[${stamp}] ${message}`, cls });
      if (appState.events.length > 40) appState.events.length = 40;
      renderEventLog();
    }

    function setState(partial) {
      Object.assign(appState, partial);
      renderState();
    }

    function renderState() {
      statusEl.textContent = appState.statusText;
      tonicEl.textContent = appState.tonicText;
      swaraEl.textContent = appState.swaraText;
      deviationEl.textContent = appState.deviationText;
      pitchEl.textContent = appState.pitchText;
      directionEl.textContent = appState.directionText;
      directionEl.style.color = appState.directionColor;

      // Group 1: accuracy
      if (totalVoicedFrames > 0) {
        const pct = ((correctFrames / totalVoicedFrames) * 100).toFixed(1);
        accuracyEl.textContent = `${pct}%`;
      }

      startBtn.disabled = appState.uiState === "starting" || appState.uiState === "running";
      stopBtn.disabled = !(appState.uiState === "running" || appState.uiState === "starting");
    }

    /* Group 4: Event log rendering */
    function renderEventLog() {
      if (eventLogEl.style.display === 'none') return;
      eventLogEl.innerHTML = '';
      for (const entry of appState.events) {
        const li = document.createElement('li');
        if (typeof entry === 'string') {
          li.textContent = entry;
        } else {
          li.textContent = entry.text;
          if (entry.cls) li.className = entry.cls;
        }
        eventLogEl.appendChild(li);
      }
    }

    logToggleBtn.addEventListener('click', () => {
      const hidden = eventLogEl.style.display === 'none';
      eventLogEl.style.display = hidden ? '' : 'none';
      logToggleBtn.textContent = hidden ? 'Hide Event Log' : 'Show Event Log';
      if (hidden) renderEventLog();
    });

    /* Group 2: Rich alert rendering */
    function renderAlert(data) {
      // data: { severity, title, message, suggestion, explanation, correction } or null for clear
      alertPanel.innerHTML = '';
      alertPanel.className = 'alert-panel';

      if (!data) {
        alertPanel.textContent = 'No alerts';
        return;
      }

      alertPanel.classList.add(`severity-${data.severity}`);

      if (data.icon) {
        const prefix = document.createTextNode(data.icon + ' ');
        alertPanel.appendChild(prefix);
      }
      if (data.title) {
        const t = document.createElement('div');
        t.className = 'alert-title';
        t.textContent = data.title;
        alertPanel.appendChild(t);
      }
      if (data.message) {
        const m = document.createElement('div');
        m.className = 'alert-message';
        m.textContent = data.message;
        alertPanel.appendChild(m);
      }
      if (data.suggestion) {
        const s = document.createElement('div');
        s.className = 'alert-suggestion';
        s.textContent = data.suggestion;
        alertPanel.appendChild(s);
      }
      if (data.explanation) {
        const d = document.createElement('details');
        const sum = document.createElement('summary');
        sum.textContent = 'Explanation';
        d.appendChild(sum);
        const p = document.createElement('p');
        p.textContent = data.explanation;
        p.style.margin = '0.3rem 0 0 0';
        d.appendChild(p);
        alertPanel.appendChild(d);
      }
      if (data.pitch_correction) {
        const pc = document.createElement('div');
        pc.className = 'alert-correction';
        pc.style.color = 'var(--warn)';
        pc.style.marginTop = '0.25rem';
        pc.textContent = '🎵 ' + data.pitch_correction;
        alertPanel.appendChild(pc);
      }
      if (data.correction) {
        const c = document.createElement('div');
        c.className = 'alert-correction';
        c.textContent = data.correction;
        alertPanel.appendChild(c);
      }

      // Progress bar
      const bar = document.createElement('div');
      bar.className = 'alert-bar';
      alertPanel.appendChild(bar);
    }

    /* Group 3: Prayoga toast */
    function showPrayogaToast(phrase) {
      const phraseStr = phrase.join(' \u2192 ');
      const congrats = _PRAYOGA_CONGRATS[Math.floor(Math.random() * _PRAYOGA_CONGRATS.length)];
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = `${congrats} Prayoga: ${phraseStr}`;
      toastContainer.appendChild(toast);
      setTimeout(() => { toast.classList.add('fading'); }, 2000);
      setTimeout(() => { toast.remove(); }, 2400);
    }

    /* ── Graph ── */
    function resolveGraphSwaraIndex(event) {
      if (event.swara) {
        const normalized = String(event.swara).trim();
        if (swaraToIndex.has(normalized)) return swaraToIndex.get(normalized);
      }
      if (Number.isFinite(event.swara_index)) {
        const idx = Math.round(event.swara_index);
        if (idx >= 0 && idx < swaraLabels.length) return idx;
      }
      return null;
    }

    function drawSwaraGraph() {
      const w = swaraCanvas.width;
      const h = swaraCanvas.height;
      swaraCtx.clearRect(0, 0, w, h);

      // Grid lines
      swaraCtx.strokeStyle = "#1e293b";
      swaraCtx.lineWidth = 1;
      for (let i = 0; i < swaraLabels.length; i++) {
        const y = yForSwaraIndexBase(i, h);
        swaraCtx.beginPath();
        swaraCtx.moveTo(0, y);
        swaraCtx.lineTo(w, y);
        swaraCtx.stroke();

        swaraCtx.fillStyle = "#94a3b8";
        swaraCtx.font = "11px Arial";
        swaraCtx.fillText(swaraLabels[i], 6, y - 4);
      }

      if (graphPoints.length < 2) return;

      // Group 7: Draw colour-coded segments
      const pts = graphPoints.map((p, i) => ({
        x: (i / (maxGraphPoints - 1)) * w,
        y: yForSwaraIndex(p.swaraIndex, h, p.centsDev),
        color: colorForErrorType(p.errorType),
      }));

      swaraCtx.lineWidth = 2;
      for (let i = 1; i < pts.length; i++) {
        swaraCtx.strokeStyle = pts[i].color;
        swaraCtx.beginPath();
        swaraCtx.moveTo(pts[i - 1].x, pts[i - 1].y);
        if (i < pts.length - 1) {
          const midX = (pts[i].x + pts[i + 1].x) / 2;
          const midY = (pts[i].y + pts[i + 1].y) / 2;
          swaraCtx.quadraticCurveTo(pts[i].x, pts[i].y, midX, midY);
        } else {
          swaraCtx.lineTo(pts[i].x, pts[i].y);
        }
        swaraCtx.stroke();
      }

      // Current point marker
      const last = pts[pts.length - 1];
      swaraCtx.fillStyle = "#67e8f9";
      swaraCtx.beginPath();
      swaraCtx.arc(last.x, last.y, 3, 0, Math.PI * 2);
      swaraCtx.fill();
    }

    function animateGraph(nowMs) {
      if (latestSwaraIndex !== null) {
        if ((nowMs - lastGraphPushMs) >= 30) {
          graphPoints.push({
            swaraIndex: latestSwaraIndex,
            centsDev: latestCentsDev,
            errorType: latestErrorType,
            t: nowMs,
          });
          if (graphPoints.length > maxGraphPoints) graphPoints.shift();
          lastGraphPushMs = nowMs;
        }
      }
      drawSwaraGraph();
      window.requestAnimationFrame(animateGraph);
    }

    /* ── Data loading ── */
    async function loadRagas() {
      const res = await fetch('/ragas');
      const ragas = await res.json();
      appState.ragas = ragas;

      ragaSelect.innerHTML = "";
      ragas.forEach((r) => {
        const o = document.createElement('option');
        o.value = r;
        o.textContent = r;
        ragaSelect.appendChild(o);
      });

      if (appState.selectedRaga && ragas.includes(appState.selectedRaga)) {
        ragaSelect.value = appState.selectedRaga;
      } else if (ragas.length > 0) {
        ragaSelect.value = ragas[0];
        appState.selectedRaga = ragas[0];
      }

      persistUiState();
      renderState();
    }

    function float32ToBase64(floatArray) {
      const bytes = new Uint8Array(floatArray.buffer);
      let binary = '';
      const chunk = 0x8000;
      for (let i = 0; i < bytes.length; i += chunk) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
      }
      return btoa(binary);
    }

    async function teardownAudioCapture() {
      if (_teardownInProgress) return;
      _teardownInProgress = true;

      try {
        if (workletNode && workletNode.port) {
          workletNode.port.onmessage = null;
          workletNode.port.onmessageerror = null;
        }

        if (workletNode) {
          try { workletNode.disconnect(); } catch (_) {}
        }
        if (sourceNode) {
          try { sourceNode.disconnect(); } catch (_) {}
        }

        if (audioContext && audioContext.state !== 'closed') {
          try { await audioContext.close(); } catch (_) {}
        }

        if (mediaStream) {
          try { mediaStream.getTracks().forEach(t => t.stop()); } catch (_) {}
        }
      } finally {
        workletNode = null;
        sourceNode = null;
        audioContext = null;
        mediaStream = null;
        _teardownInProgress = false;
      }
    }

    /* ── Server event handler ── */
    function handleServerEvents(payload) {
      if (!payload) return;

      if (payload.stage && appState.uiState !== 'running') {
        setState({ statusText: payload.stage });
      }
      if (payload.tonic_hz) {
        const tonicText = payload.tonic_hz.toFixed ? `${payload.tonic_hz.toFixed(2)} Hz` : `${payload.tonic_hz} Hz`;
        setState({ tonicText });
      }

      if (!payload.events) return;

      for (const event of payload.events) {
        if (event.type === 'frame_event') {
          if (event.swara) {
            let devText = "";
            if (event.cents_deviation !== undefined) {
              const sign = event.cents_deviation > 0 ? '+' : '';
              devText = `(${sign}${event.cents_deviation.toFixed(1)} cents)`;
            }
            setState({ swaraText: event.swara, deviationText: devText });
          }
          setState({ pitchText: `${event.frequency_hz ?? '-'} Hz` });

          /* Group 1: Direction KPI */
          if (event.direction) {
            let dirText = '-';
            let dirColor = 'var(--muted)';
            if (event.direction === 'ascending') { dirText = '\u2191 Ascending'; dirColor = 'var(--brand)'; }
            else if (event.direction === 'descending') { dirText = '\u2193 Descending'; dirColor = 'var(--warn)'; }
            else if (event.direction === 'neutral') { dirText = '\u2014 Neutral'; dirColor = 'var(--muted)'; }
            else if (event.direction === 'unknown') { dirText = '-'; dirColor = 'var(--muted)'; }
            else { dirText = event.direction; }
            setState({ directionText: dirText, directionColor: dirColor });
          }

          /* Group 1: Accuracy counter */
          totalVoicedFrames++;
          if (!event.error_type) {
            correctFrames++;
          }
          renderState();

          /* Group 3: Prayoga toast */
          if (event.matched_phrase && Array.isArray(event.matched_phrase)) {
            showPrayogaToast(event.matched_phrase);
            const congrats = _PRAYOGA_CONGRATS[Math.floor(Math.random() * _PRAYOGA_CONGRATS.length)];
            pushEvent(`${congrats} Prayoga: ${event.prayoga_message || event.matched_phrase.join(' → ')}`, 'log-prayoga');
          }

          /* Group 8: Gamaka KPI */
          if (event.gamaka_type) {
            gamakaEl.textContent = event.gamaka_type;
            clearTimeout(gamakaClearTimer);
            gamakaClearTimer = setTimeout(() => { gamakaEl.textContent = '-'; }, 1000);
          }
          if (event.gamaka_missing) {
            gamakaBadge.textContent = '\u266A missing';
            gamakaBadge.classList.add('visible');
            clearTimeout(gamakaBadgeClearTimer);
            gamakaBadgeClearTimer = setTimeout(() => { gamakaBadge.classList.remove('visible'); }, 1000);
          }

          /* Graph data */
          const graphSwaraIndex = resolveGraphSwaraIndex(event);
          if (graphSwaraIndex !== null) {
            if (lastGraphTs < 0 || (event.timestamp_ms - lastGraphTs) >= graphUpdateIntervalMs) {
              latestSwaraIndex = graphSwaraIndex;
              latestCentsDev = event.cents_deviation || 0;
              latestErrorType = event.error_type || null;
              lastGraphTs = event.timestamp_ms;
            }
          }
        }

        /* Group 2: Rich alert events */
        if (event.type === 'alert_event' && event.state === 'active') {
          const severityMap = {
            'forbidden_note': { icon: '\u26D4', severity: 'forbidden_note' },
            'forbidden_phrase': { icon: '\u26A0', severity: 'forbidden_phrase' },
            'gamaka_missing': { icon: '\u266A', severity: 'gamaka_missing' },
          };
          const sev = severityMap[event.alert] || severityMap['forbidden_note'];
          renderAlert({
            severity: sev.severity,
            icon: sev.icon,
            title: event.title || null,
            message: event.message,
            suggestion: event.suggestion || null,
            explanation: event.explanation || null,
            pitch_correction: event.pitch_correction || null,
            correction: event.correction || null,
          });
          const logMsg = event.pitch_correction
            ? `Alert: ${event.message} — ${event.pitch_correction}`
            : `Alert: ${event.message}`;
          const logCls = event.alert === 'forbidden_phrase' ? 'log-warn' : 'log-error';
          pushEvent(logMsg, logCls);
        }

        if (event.type === 'alert_event' && event.state === 'cleared') {
          renderAlert({
            severity: 'cleared',
            icon: '\u2713',
            title: 'Back on track!',
            message: 'Good recovery \u2014 keep singing.',
            suggestion: null,
            explanation: null,
            correction: null,
          });
          pushEvent('\u2713 Back on track \u2014 alert cleared', 'log-cleared');
        }

        if (event.type === 'session_status' && event.stage === 'locked') {
          setState({
            uiState: 'running',
            statusText: 'running',
            tonicText: `${event.tonic_hz} Hz`,
          });
          pushEvent(`Tonic locked at ${event.tonic_hz} Hz`);
        }
      }
    }

    /* ── Session lifecycle ── */
    async function startSession() {
      const raga = ragaSelect.value;
      if (!raga) return;

      // Ensure prior take resources are fully released before creating new ones.
      await teardownAudioCapture();

      /* Reset accuracy counters */
      totalVoicedFrames = 0;
      correctFrames = 0;
      accuracyEl.textContent = '-';
      gamakaEl.textContent = '-';
      renderAlert(null);

      setState({ uiState: 'starting', statusText: 'starting', selectedRaga: raga });
      persistUiState();
      pushEvent(`Starting session for ${raga}`);

      const language = langSelect.value;
      const res = await fetch('/session/start', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ raga_name: raga, bootstrap_seconds: 1.5, language: language })
      });
      const session = await res.json();
      sessionId = session.session_id;

      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${protocol}://${location.host}/ws/live/${sessionId}`);

      ws.onmessage = (msg) => {
        const payload = JSON.parse(msg.data);
        handleServerEvents(payload);
      };

      ws.onerror = (err) => {
        console.error('WebSocket error:', err);
        renderAlert({
          severity: 'forbidden_note',
          icon: '\u26D4',
          title: 'Connection Error',
          message: 'WebSocket connection error',
          suggestion: 'Check your network and try again',
        });
        setState({ uiState: 'error', wsState: 'error' });
        pushEvent('WebSocket error');
      };

      ws.onclose = async () => {
        console.log('WebSocket closed');
        setState({ wsState: 'disconnected' });
        pushEvent('WebSocket closed');
        await teardownAudioCapture();
      };

      ws.onopen = async () => {
        setState({ wsState: 'connected' });
        pushEvent('WebSocket connected');
        await setupAudioCapture();
      };
    }

    async function setupAudioCapture() {
      try {
        console.log('Checking for getUserMedia...');

        const fallbackGetUserMedia = () => {
          const legacy = navigator.getUserMedia || navigator.webkitGetUserMedia || navigator.mozGetUserMedia;
          if (!legacy) return null;
          return (constraints) => new Promise((resolve, reject) => {
            legacy.call(navigator, constraints, resolve, reject);
          });
        };

        let getUserMediaFn = null;
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
          getUserMediaFn = (constraints) => navigator.mediaDevices.getUserMedia(constraints);
        } else {
          getUserMediaFn = fallbackGetUserMedia();
        }

        if (!getUserMediaFn) {
          throw new Error('Microphone API unavailable. Use HTTPS or localhost, and allow microphone permission.');
        }

        setState({ statusText: 'bootstrapping' });
        console.log('Requesting microphone access...');
        mediaStream = await getUserMediaFn({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false,
            channelCount: 1,
            sampleRate: { ideal: 22050 },
            latency: { ideal: 0.01, max: 0.05 }
          }
        });
        console.log('Got microphone stream:', mediaStream.getAudioTracks().length, 'audio tracks');

        audioContext = new (window.AudioContext || window.webkitAudioContext)({
          latencyHint: 'interactive',
          sampleRate: 22050,
        });
        console.log('AudioContext created, sampleRate:', audioContext.sampleRate);

        console.log('Loading audio worklet...');
        await audioContext.audioWorklet.addModule('/static/audio-worklet.js');
        console.log('Worklet module loaded');

        sourceNode = audioContext.createMediaStreamSource(mediaStream);
        workletNode = new AudioWorkletNode(audioContext, 'chunk-capture-processor', {
          processorOptions: { bufferSize: 512 }
        });
        console.log('Worklet node created');

        let chunkCount = 0;
        workletNode.port.onmessage = (e) => {
          chunkCount++;
          if (chunkCount <= 3) {
            console.log('Audio worklet firing, chunk #' + chunkCount);
          }
          if (!ws || ws.readyState !== WebSocket.OPEN) {
            if (chunkCount === 1) console.warn('WebSocket not ready yet');
            return;
          }
          if (ws.bufferedAmount > 256 * 1024) {
            return;
          }
          const chunk = e.data;
          ws.send(JSON.stringify({
            type: 'audio_chunk',
            chunk_id: chunkId++,
            sample_rate: audioContext.sampleRate,
            audio_b64: float32ToBase64(chunk)
          }));
        };

        workletNode.port.onmessageerror = (e) => {
          console.error('Worklet port error:', e);
        };

        sourceNode.connect(workletNode);
        console.log('Audio stream connected to worklet');

        setState({ uiState: 'running' });
        graphPoints.length = 0;
        lastGraphTs = -1;
        latestSwaraIndex = null;
        latestCentsDev = 0;
        latestErrorType = null;
        lastGraphPushMs = performance.now();
        drawSwaraGraph();
        pushEvent('Audio capture ready');
        console.log('Audio capture ready');
      } catch (err) {
        console.error('Error during audio setup:', err);
        renderAlert({
          severity: 'forbidden_note',
          icon: '\u26D4',
          title: 'Audio Error',
          message: err.message,
          suggestion: 'Check microphone permissions and try again',
        });
        setState({ uiState: 'error', statusText: 'error' });
        pushEvent(`Audio error: ${err.message}`);
        if (ws && ws.readyState === WebSocket.OPEN) ws.close();
      }
    }

    /* Group 6: session summary rendering */
    function showSessionSummary(summary) {
      if (!summary) return;
      const fb = summary.feedback || {};
      const v = summary.validation || {};

      let html = `<h3>${fb.session_title || summary.raga + ' Session Summary'}</h3>`;

      // Score & accuracy
      html += `<div class="summary-row"><span class="sr-label">Performance Score</span><span class="sr-value">${fb.performance_score !== undefined ? fb.performance_score.toFixed(1) : '-'}</span></div>`;
      html += `<div class="summary-row"><span class="sr-label">Total Notes</span><span class="sr-value">${fb.total_notes ?? '-'}</span></div>`;
      html += `<div class="summary-row"><span class="sr-label">Errors</span><span class="sr-value">${fb.error_count ?? '-'} (${fb.error_rate ?? '-'})</span></div>`;
      html += `<div class="summary-row"><span class="sr-label">Pitch Accuracy</span><span class="sr-value">${fb.pitch_accuracy ?? '-'}</span></div>`;
      html += `<div class="summary-row"><span class="sr-label">Forbidden Phrases</span><span class="sr-value">${summary.forbidden_phrase_count ?? 0}</span></div>`;
      html += `<div class="summary-row"><span class="sr-label">Prayogas Completed</span><span class="sr-value">${summary.characteristic_phrases_completed ?? 0}</span></div>`;

      // Assessment
      if (fb.assessment) {
        html += `<div class="summary-section"><h4>Assessment</h4><p style="margin:0;font-size:0.92rem;">${fb.assessment}</p></div>`;
      }

      // Phrase details
      if (summary.phrase_details && summary.phrase_details.length > 0) {
        html += `<div class="summary-section"><h4>Characteristic Phrases</h4><ul>`;
        const phraseCounts = {};
        for (const p of summary.phrase_details) {
          const key = p.join(' \u2192 ');
          phraseCounts[key] = (phraseCounts[key] || 0) + 1;
        }
        for (const [phrase, count] of Object.entries(phraseCounts)) {
          html += `<li>${phrase} &times; ${count}</li>`;
        }
        html += `</ul></div>`;
      }

      // Recommendations
      if (fb.recommendations && fb.recommendations.length > 0) {
        html += `<div class="summary-section"><h4>Recommendations</h4><ul>`;
        for (const rec of fb.recommendations) {
          html += `<li>${rec}</li>`;
        }
        html += `</ul></div>`;
      }

      // Action buttons
      html += `<div class="summary-actions">`;
      html += `<button id="summaryCloseBtn">Close</button>`;
      html += `<button id="summaryCopyBtn">Copy to Clipboard</button>`;
      html += `</div>`;

      summaryPanel.innerHTML = html;
      summaryOverlay.classList.add('visible');

      document.getElementById('summaryCloseBtn').addEventListener('click', () => {
        summaryOverlay.classList.remove('visible');
      });
      document.getElementById('summaryCopyBtn').addEventListener('click', () => {
        const text = summaryPanel.innerText;
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById('summaryCopyBtn');
          btn.textContent = 'Copied!';
          setTimeout(() => { btn.textContent = 'Copy to Clipboard'; }, 1500);
        });
      });
    }

    // Close overlay on background click
    summaryOverlay.addEventListener('click', (e) => {
      if (e.target === summaryOverlay) summaryOverlay.classList.remove('visible');
    });

    async function stopSession() {
      setState({ uiState: 'stopping', statusText: 'stopping' });
      pushEvent('Stopping session');

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'stop' }));
        ws.close();
      }

      await teardownAudioCapture();

      if (sessionId) {
        const res = await fetch(`/session/${sessionId}/stop`, { method: 'POST' });
        const summary = await res.json();
        /* Group 6: Show full session summary */
        showSessionSummary(summary);
        pushEvent(`Session score: ${summary?.feedback?.performance_score?.toFixed?.(1) ?? '-'}`);
      }

      setState({ uiState: 'idle', statusText: 'stopped', wsState: 'disconnected' });
      sessionId = null;
    }

    ragaSelect.addEventListener('change', () => {
      setState({ selectedRaga: ragaSelect.value });
      persistUiState();
    });

    startBtn.addEventListener('click', startSession);
    stopBtn.addEventListener('click', stopSession);

    restoreUiState();
    renderState();
    loadRagas();
    drawSwaraGraph();
    window.requestAnimationFrame(animateGraph);
  </script>
</body>
</html>
